# Rock5B Rescue Preseed
# Boots Debian installer into SSH-accessible network-console mode.
# Connect: ssh installer@192.168.50.2   password: rescue123

# Locale / keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network — auto DHCP, no interactive questions
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string rock5b
d-i netcfg/get_domain string

# SSH access via network-console module
d-i anna/choose_modules string network-console
d-i network-console/password password rescue123
d-i network-console/password-again password rescue123
d-i network-console/start boolean true
